<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAL Agente de IA</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Segoe UI, sans-serif; background: #0f1117; color: #e0e0e0; height: 100vh; display: flex; align-items: center; justify-content: center; }
.container { width: 100%; max-width: 800px; height: 100vh; display: flex; flex-direction: column; background: #1a1d27; }
.header { display: flex; align-items: center; gap: 14px; padding: 18px 24px; background: #12151f; border-bottom: 1px solid #2a2d3e; }
.header img { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; }
.header h1 { font-size: 18px; font-weight: 700; color: #fff; }
.header span { font-size: 12px; color: #6ee7b7; display: block; }
.badge { margin: 10px 24px 0; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; display: none; }
.badge.queja { background: #3b1f1f; color: #f87171; display: block; }
.badge.busqueda { background: #1f2d3b; color: #60a5fa; display: block; }
.badge.consulta { background: #1f3b2a; color: #6ee7b7; display: block; }
.chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.msg { display: flex; flex-direction: column; max-width: 75%; }
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.bot { align-self: flex-start; align-items: flex-start; }
.bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; }
.msg.user .bubble { background: #6ee7b7; color: #0f1117; border-bottom-right-radius: 4px; }
.msg.bot .bubble { background: #252836; color: #e0e0e0; border-bottom-left-radius: 4px; }
.msg-time { font-size: 10px; color: #555; margin-top: 4px; padding: 0 4px; }
.input-area { padding: 16px 24px; background: #12151f; border-top: 1px solid #2a2d3e; display: flex; gap: 12px; align-items: center; }
.input-area input { flex: 1; background: #252836; border: 1px solid #2a2d3e; border-radius: 12px; padding: 12px 16px; color: #e0e0e0; font-size: 14px; outline: none; }
.input-area input:focus { border-color: #6ee7b7; }
.btn-send { background: #6ee7b7; color: #0f1117; border: none; border-radius: 12px; padding: 12px 20px; font-weight: 700; cursor: pointer; font-size: 14px; }
.btn-send:disabled { background: #2a2d3e; color: #555; cursor: not-allowed; }
.btn-reset { background: transparent; color: #555; border: 1px solid #2a2d3e; border-radius: 12px; padding: 12px 16px; cursor: pointer; font-size: 13px; }
.setup-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; gap: 24px; }
.setup-screen img { width: 80px; height: 80px; border-radius: 20px; }
.setup-screen h2 { font-size: 24px; font-weight: 700; color: #fff; text-align: center; }
.setup-screen p { color: #888; text-align: center; font-size: 14px; }
.setup-input { width: 100%; max-width: 360px; background: #252836; border: 1px solid #2a2d3e; border-radius: 12px; padding: 14px 18px; color: #e0e0e0; font-size: 15px; outline: none; }
.setup-input:focus { border-color: #6ee7b7; }
.btn-confirmar { background: #6ee7b7; color: #0f1117; border: none; border-radius: 12px; padding: 14px 32px; font-weight: 700; font-size: 15px; cursor: pointer; width: 100%; max-width: 360px; }
.typing { display: flex; gap: 5px; padding: 12px 16px; background: #252836; border-radius: 16px; width: fit-content; }
.typing span { width: 8px; height: 8px; background: #6ee7b7; border-radius: 50%; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
.warning-box { margin: 0 24px 12px; padding: 12px 16px; background: #2d2416; border: 1px solid #92400e; border-radius: 10px; font-size: 13px; color: #fbbf24; }
</style>
</head>
<body>
<div class="container">

<div class="setup-screen" id="setupScreen">
<img src="/static/dal_logo.jpg" alt="DAL">
<h2>DAL - Creamos Agentes de IA</h2>
<p>Ingresa el nombre de tu negocio para personalizar el asistente</p>
<input class="setup-input" id="negocioInput" type="text" placeholder="Ej: Ferreteria El Tornillo">
<button class="btn-confirmar" onclick="configurar()">Confirmar</button>
</div>

<div id="chatScreen" style="display:none; flex-direction:column; height:100vh;">
<div class="header">
<img src="/static/dal_logo.jpg" alt="DAL">
<div>
<h1>DAL - Agente de IA</h1>
<span id="negocioLabel">Configurado para: </span>
</div>
</div>
<div class="badge" id="badge"></div>
<div class="chat-area" id="chatArea"></div>
<div class="warning-box" id="warningBox" style="display:none">Un responsable te va a contactar a la brevedad.</div>
<div class="input-area">
<input type="text" id="msgInput" placeholder="Escribi tu consulta..." onkeydown="if(event.key==='Enter') enviar()">
<button class="btn-send" id="btnSend" onclick="enviar()">Enviar</button>
<button class="btn-reset" onclick="resetear()">Nueva conversacion</button>
</div>
</div>

</div>
<script>
var capturando = null;

function hora() {
  var now = new Date();
  var h = now.getHours().toString();
  var m = now.getMinutes().toString();
  if (h.length < 2) h = '0' + h;
  if (m.length < 2) m = '0' + m;
  return h + ':' + m;
}

function agregarMsg(texto, rol) {
  var area = document.getElementById('chatArea');
  var div = document.createElement('div');
  div.className = 'msg ' + rol;
  var bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = texto;
  var time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = hora();
  div.appendChild(bubble);
  div.appendChild(time);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function mostrarTyping() {
  var area = document.getElementById('chatArea');
  var div = document.createElement('div');
  div.id = 'typing';
  div.className = 'msg bot';
  var typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';
  div.appendChild(typing);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function quitarTyping() {
  var t = document.getElementById('typing');
  if (t) t.remove();
}

function mostrarBadge(tipo) {
  var badge = document.getElementById('badge');
  badge.className = 'badge';
  if (tipo.indexOf('queja') >= 0) {
    badge.className = 'badge queja';
    badge.textContent = 'Queja detectada';
  } else if (tipo.indexOf('busqueda') >= 0) {
    badge.className = 'badge busqueda';
    badge.textContent = 'Busqueda web';
  } else if (tipo.indexOf('escalado') >= 0) {
    badge.className = 'badge queja';
    badge.textContent = 'Escalando a humano';
  } else {
    badge.className = 'badge consulta';
    badge.textContent = 'Consulta general';
  }
}

function configurar() {
  var negocio = document.getElementById('negocioInput').value.trim();
  if (!negocio) return;
  fetch('/api/config', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({negocio: negocio})
  }).then(function() {
    document.getElementById('setupScreen').style.display = 'none';
    var chat = document.getElementById('chatScreen');
    chat.style.display = 'flex';
    document.getElementById('negocioLabel').textContent = 'Configurado para: ' + negocio;
    agregarMsg('Hola! Soy el asistente virtual de ' + negocio + '. En que te puedo ayudar?', 'bot');
  });
}

function enviar() {
  var input = document.getElementById('msgInput');
  var mensaje = input.value.trim();
  if (!mensaje) return;
  input.value = '';
  document.getElementById('btnSend').disabled = true;
  agregarMsg(mensaje, 'user');
  mostrarTyping();
  fetch('/api/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({mensaje: mensaje})
  }).then(function(res) {
    return res.json();
  }).then(function(data) {
    quitarTyping();
    agregarMsg(data.respuesta, 'bot');
    mostrarBadge(data.tipo);
    capturando = data.capturando;
    if (data.tipo === 'escalado_completo') {
      document.getElementById('warningBox').style.display = 'block';
    }
    document.getElementById('btnSend').disabled = false;
    input.focus();
  });
}

function resetear() {
  fetch('/api/reset', {method: 'POST'}).then(function() {
    document.getElementById('chatArea').innerHTML = '';
    document.getElementById('badge').className = 'badge';
    document.getElementById('warningBox').style.display = 'none';
    document.getElementById('chatScreen').style.display = 'none';
    document.getElementById('setupScreen').style.display = 'flex';
    document.getElementById('negocioInput').value = '';
    capturando = null;
  });
}
</script>
</body>
</html>
